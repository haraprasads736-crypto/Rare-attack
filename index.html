<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RG - MP40 LOBBY 3D</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Rajdhani', sans-serif; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .btn { pointer-events: auto; background: rgba(0,0,0,0.7); border: 1px solid #00f2fe; color: white; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .start-btn { align-self: center; background: linear-gradient(90deg, #ffde00, #ff8c00); color: black; padding: 15px 60px; font-size: 25px; border-radius: 5px; font-weight: 800; border: none; cursor: pointer; pointer-events: auto; box-shadow: 0 0 20px #ff8c00; }
        .instruction { position: absolute; bottom: 100px; width: 100%; text-align: center; color: #00f2fe; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="ui">
        <div style="display: flex; justify-content: space-between;">
            <div class="btn">GURU PRASAD <br> <span style="color: #ffd700;">$ 620</span></div>
            <div class="btn">LVL 85</div>
        </div>
        <div class="instruction">Swipe to Rotate Lobby</div>
        <button class="start-btn">START</button>
    </div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 1. Orbit Controls (Screen Rotation) ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; 
        controls.autoRotate = false;
        controls.maxPolarAngle = Math.PI / 2; // Floor ke niche nahi jayega

        // --- 2. Environment ---
        const grid = new THREE.GridHelper(50, 50, 0x00f2fe, 0x111111);
        grid.position.y = -3;
        scene.add(grid);

        // --- 3. MP40 CHARACTER ---
        const charGroup = new THREE.Group();

        // Body (Cyber Suit)
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.8, 1.8, 4, 8), new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9 }));
        charGroup.add(body);

        // MP40 Gun (Box Modeling)
        const mp40Group = new THREE.Group();
        // Main Body
        const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.4, 1.5), new THREE.MeshStandardMaterial({ color: 0xffde00, emissive: 0x332200 }));
        mp40Group.add(gunBody);
        // Barrel
        const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.8), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        barrel.rotation.x = Math.PI / 2;
        barrel.position.z = 1;
        mp40Group.add(barrel);
        // Magazine
        const mag = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.6, 0.3), new THREE.MeshStandardMaterial({ color: 0x111111 }));
        mag.position.y = -0.4;
        mp40Group.add(mag);

        // Pakdne ki Position
        mp40Group.position.set(0.8, 0, 0.5);
        mp40Group.rotation.y = -0.2;
        charGroup.add(mp40Group);
        
        charGroup.position.y = -0.5;
        scene.add(charGroup);

        // --- 4. Lights ---
        const hLight = new THREE.HemisphereLight(0xffffff, 0x000000, 1);
        scene.add(hLight);
        const pLight = new THREE.PointLight(0x00f2fe, 2, 20);
        pLight.position.set(2, 5, 5);
        scene.add(pLight);

        camera.position.set(0, 2, 10);

        // --- 5. Animation ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Rotation smooth karne ke liye
            
            // Idle Floating
            charGroup.position.y = -0.5 + Math.sin(Date.now() * 0.001) * 0.1;
            mp40Group.rotation.z = Math.sin(Date.now() * 0.002) * 0.05;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
